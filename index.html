<!doctype html>
<html lang="th">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ganesha - Next.js</title>

        <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

        <script src="https://unpkg.com/lucide@latest"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+Thai:wght@300;400;600;700&display=swap"
            rel="stylesheet"
        />

        <style type="text/tailwindcss">
            @theme {
                --font-serif: "Noto Serif Thai", serif;
                --font-sans: "Inter", sans-serif;

                --color-gold-300: #e6c875;
                --color-gold-400: #d4af37;
                --color-gold-500: #aa8c2c;
                --color-gold-700: #715d1d;
                --color-dark-900: #121212;
                --color-dark-950: #0a0a0a;
            }

            body {
                font-family: var(--font-sans);
                background-color: var(--color-dark-950);
                color: #e5e5e5;
                overflow: hidden; /* ล็อคหน้าจอไม่ให้มี Scrollbar ของ Browser */
            }

            /* 3D Utilities */
            .perspective-1000 {
                perspective: 1000px;
            }
            .preserve-3d {
                transform-style: preserve-3d;
            }
            .backface-hidden {
                backface-visibility: hidden;
            }
            .rotate-y-180 {
                transform: rotateY(180deg);
            }

            .hide-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .hide-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }

            /* Filter Button Active State */
            .filter-active {
                background-color: var(--color-gold-700) !important;
                color: #fff !important;
                border-color: var(--color-gold-400) !important;
            }
        </style>
    </head>
    <body class="w-full h-[100dvh] flex flex-col lg:flex-row relative">
        <div
            class="absolute inset-0 pointer-events-none bg-[radial-gradient(circle_at_center,_var(--color-dark-900)_0%,_var(--color-dark-950)_70%)]"
        ></div>

        <!-- ==========================================
         LEFT PANEL (The Altar - Card Flip) 
         ========================================== -->
        <section
            class="relative w-full lg:w-[55%] h-[55dvh] lg:h-full flex items-center justify-center p-6 z-10"
        >
            <!-- Interactive Card Container -->
            <div
                id="card-container"
                class="relative w-full max-w-[240px] md:max-w-sm lg:max-w-md aspect-[3/4] perspective-1000 cursor-pointer group"
            >
                <!-- Aura Effect -->
                <div
                    id="card-aura"
                    class="absolute -inset-4 bg-gold-700/20 blur-3xl rounded-full opacity-50 transition-colors duration-700"
                ></div>

                <!-- Inner Card (3D Flipper) -->
                <div
                    id="card-inner"
                    class="w-full h-full relative duration-700 preserve-3d transition-transform rounded-2xl shadow-2xl shadow-black/80"
                >
                    <!-- ด้านหน้า (Front: Image) -->
                    <div
                        class="absolute inset-0 w-full h-full backface-hidden rounded-2xl overflow-hidden border border-gold-700/40 bg-neutral-900"
                    >
                        <img
                            id="card-image"
                            src="https://placehold.co/600x800/1a1a1a/d4af37?text=Loading..."
                            alt="Ganesha Image"
                            class="w-full h-full object-cover"
                        />
                        <div
                            class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent pointer-events-none"
                        ></div>

                        <!-- Hint Icon (แตะเพื่อพลิก) -->
                        <div
                            class="absolute bottom-4 right-4 bg-black/50 p-2 rounded-full border border-gold-700/50 backdrop-blur-sm"
                        >
                            <i
                                data-lucide="rotate-cw"
                                class="w-4 h-4 text-gold-400"
                            ></i>
                        </div>
                    </div>

                    <!-- ด้านหลัง (Back: Yantra / Mantra) -->
                    <div
                        class="absolute inset-0 w-full h-full backface-hidden rounded-2xl border border-gold-500/50 bg-neutral-950 rotate-y-180 flex flex-col items-center justify-center p-8 text-center bg-[radial-gradient(ellipse_at_center,_#2a2010_0%,_#0a0a0a_100%)]"
                    >
                        <i
                            data-lucide="sparkles"
                            class="w-8 h-8 text-gold-500 mb-6 opacity-50"
                        ></i>
                        <h3
                            class="text-sm font-semibold text-neutral-400 tracking-widest uppercase mb-4"
                        >
                            คาถาบูชา
                        </h3>
                        <p
                            id="card-mantra-back"
                            class="text-xl md:text-2xl font-serif text-gold-300 leading-relaxed italic"
                        >
                            โอม ศรี คณปติ ยะนะมะฮา
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <!-- ==========================================
         RIGHT PANEL (The Codex - Data & Controls) 
         ========================================== -->
        <section
            class="relative w-full lg:w-[45%] h-[45dvh] lg:h-full flex flex-col px-6 pb-6 pt-2 lg:p-16 z-20 overflow-y-auto hide-scrollbar border-t lg:border-t-0 lg:border-l border-gold-700/20 bg-dark-950/80 backdrop-blur-md lg:bg-transparent lg:backdrop-blur-none lg:justify-center"
        >
            <div
                class="max-w-xl mx-auto lg:mx-0 w-full flex flex-col h-full lg:h-auto"
            >
                <!-- Filters Section -->
                <div class="mb-6 lg:mb-10">
                    <div class="flex items-center gap-2 mb-3">
                        <i
                            data-lucide="filter"
                            class="w-4 h-4 text-neutral-500"
                        ></i>
                        <span
                            class="text-xs text-neutral-500 uppercase tracking-widest"
                            >หมวดหมู่ขอพร</span
                        >
                    </div>
                    <div id="filter-container" class="flex flex-wrap gap-2">
                        <!-- ปุ่ม Filter จะถูกสร้างด้วย JS -->
                    </div>
                </div>

                <!-- Content Section -->
                <div class="flex-1 lg:flex-none">
                    <div class="flex items-center gap-3 mb-2">
                        <span
                            id="card-sequence"
                            class="text-gold-500 font-serif text-lg tracking-widest"
                        ></span>
                        <div class="h-[1px] w-8 bg-gold-700/50"></div>
                        <span
                            id="card-category"
                            class="text-xs uppercase tracking-wider text-neutral-400 border border-neutral-800 px-3 py-1 rounded-full bg-neutral-900/50"
                        ></span>
                    </div>

                    <h1
                        id="card-title"
                        class="text-2xl md:text-4xl lg:text-5xl font-serif font-bold text-gold-400 mb-1 drop-shadow-md transition-all"
                    >
                        Title
                    </h1>
                    <p
                        id="card-subtitle"
                        class="text-xs md:text-sm text-neutral-500 uppercase tracking-widest mb-6"
                    >
                        Subtitle
                    </p>

                    <div class="mb-6 lg:mb-12">
                        <h3
                            class="text-xs font-semibold text-neutral-400 mb-2 tracking-wide"
                        >
                            ความหมาย
                        </h3>
                        <p
                            id="card-desc"
                            class="text-neutral-300 leading-relaxed text-sm md:text-base font-light"
                        >
                            Description
                        </p>
                    </div>
                </div>

                <!-- Navigation Controls -->
                <div
                    class="mt-auto lg:mt-0 flex items-center justify-between lg:justify-start lg:gap-8 pt-4 border-t border-gold-700/20"
                >
                    <button
                        id="btn-prev"
                        class="w-10 h-10 lg:w-12 lg:h-12 rounded-full border border-gold-700/40 flex items-center justify-center text-gold-500 hover:bg-gold-700/20 transition-all cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
                    >
                        <i
                            data-lucide="chevron-left"
                            class="w-5 h-5 lg:w-6 lg:h-6"
                        ></i>
                    </button>

                    <div class="flex flex-col items-center">
                        <span
                            class="text-[10px] text-neutral-500 uppercase tracking-widest mb-1"
                            >Scroll หรือ ปัด เพื่อเปลี่ยน</span
                        >
                        <span
                            id="counter-text"
                            class="text-gold-400 font-serif font-bold tracking-widest text-sm lg:text-base"
                            >1 / 32</span
                        >
                    </div>

                    <button
                        id="btn-next"
                        class="w-10 h-10 lg:w-12 lg:h-12 rounded-full border border-gold-700/40 flex items-center justify-center text-gold-500 hover:bg-gold-700/20 transition-all cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed"
                    >
                        <i
                            data-lucide="chevron-right"
                            class="w-5 h-5 lg:w-6 lg:h-6"
                        ></i>
                    </button>
                </div>
            </div>
        </section>

        <script>
            lucide.createIcons();

            // 1. Data Structure
            const allGaneshaData = [
                {
                    id: 1,
                    seqThai: "๐๑",
                    category: "การเริ่มต้น/เด็ก",
                    filterKey: "startup",
                    title: "พระพาล คณปติ",
                    subtitle: "Bala Ganapati",
                    image: "https://placehold.co/600x800/1a1311/d4af37?text=001.png",
                    mantra: "โอม ศรี พาล คณปติ ยะนะมะฮา",
                    desc: "ปางเด็ก เป็นปางแห่งการเริ่มต้นและการขอพรให้เด็กๆ ประทานความอุดมสมบูรณ์ และการเริ่มต้นใหม่ที่ราบรื่น เหมาะสำหรับผู้ที่กำลังจะริเริ่มโปรเจกต์ใหม่",
                },
                {
                    id: 2,
                    seqThai: "๐๒",
                    category: "การศึกษา",
                    filterKey: "study",
                    title: "พระตารุณ คณปติ",
                    subtitle: "Taruna Ganapati",
                    image: "https://placehold.co/600x800/111a13/d4af37?text=002.png",
                    mantra: "โอม ศรี ตารุณ คณปติ ยะนะมะฮา",
                    desc: "ปางวัยรุ่น ประทานความสำเร็จในด้านการศึกษา การเรียนรู้ เป็นตัวแทนของพลังแห่งความเยาว์วัยที่ไร้ขีดจำกัด",
                },
                {
                    id: 3,
                    seqThai: "๐๓",
                    category: "ความรัก/เมตตา",
                    filterKey: "love",
                    title: "พระภักติ คณปติ",
                    subtitle: "Bhakti Ganapati",
                    image: "https://placehold.co/600x800/13111a/d4af37?text=003.png",
                    mantra: "โอม ศรี ภักติ คณปติ ยะนะมะฮา",
                    desc: "ปางแห่งความศรัทธา ประทานความสงบร่มเย็นในจิตใจ ความรัก ความเมตตา และช่วยปัดเป่าอุปสรรคทางอารมณ์",
                },
                {
                    id: 4,
                    seqThai: "๐๔",
                    category: "การเริ่มต้น/เด็ก",
                    filterKey: "startup",
                    title: "พระวีระ คณปติ",
                    subtitle: "Veera Ganapati",
                    image: "https://placehold.co/600x800/2a1311/d4af37?text=004.png",
                    mantra: "โอม ศรี วีระ คณปติ ยะนะมะฮา",
                    desc: "ปางนักรบ ประทานความกล้าหาญ ชัยชนะเหนือศัตรูคู่แข่ง เหมาะสำหรับผู้นำหรือผู้ที่ต้องเผชิญหน้ากับการแข่งขันสูง",
                },
            ];

            const filters = [
                { label: "ทั้งหมด", key: "all" },
                { label: "เริ่มต้นธุรกิจ", key: "startup" },
                { label: "การศึกษา", key: "study" },
                { label: "ความรัก", key: "love" },
            ];

            // 2. Application State
            let currentData = [...allGaneshaData];
            let currentIndex = 0;
            let activeFilter = "all";
            let isFlipped = false;

            // 3. DOM Elements Setup
            const cardInner = document.getElementById("card-inner");
            const cardContainer = document.getElementById("card-container");
            const filterContainer = document.getElementById("filter-container");

            // 4. Render Filters
            filters.forEach((filter) => {
                const btn = document.createElement("button");
                btn.className = `text-xs px-4 py-1.5 rounded-full border transition-all cursor-pointer ${
                    filter.key === activeFilter
                        ? "bg-gold-700 text-white border-gold-400"
                        : "bg-transparent text-neutral-400 border-neutral-700 hover:border-gold-700/50"
                }`;
                btn.textContent = filter.label;
                btn.onclick = () => applyFilter(filter.key, btn);
                filterContainer.appendChild(btn);
            });

            // 5. Core Functions
            function applyFilter(key, clickedBtn) {
                // Update UI State for Buttons
                Array.from(filterContainer.children).forEach((btn) => {
                    btn.classList.remove(
                        "bg-gold-700",
                        "text-white",
                        "border-gold-400",
                    );
                    btn.classList.add(
                        "bg-transparent",
                        "text-neutral-400",
                        "border-neutral-700",
                    );
                });
                clickedBtn.classList.remove(
                    "bg-transparent",
                    "text-neutral-400",
                    "border-neutral-700",
                );
                clickedBtn.classList.add(
                    "bg-gold-700",
                    "text-white",
                    "border-gold-400",
                );

                // Filter Data
                activeFilter = key;
                if (key === "all") {
                    currentData = [...allGaneshaData];
                } else {
                    currentData = allGaneshaData.filter(
                        (item) => item.filterKey === key,
                    );
                }

                currentIndex = 0; // Reset index when filter changes

                // ถัาการ์ดพลิกอยู่ ให้พลิกกลับก่อน
                if (isFlipped) flipCard(false);

                updateUI();
            }

            function flipCard(forceState = null) {
                isFlipped = forceState !== null ? forceState : !isFlipped;
                if (isFlipped) {
                    cardInner.classList.add("rotate-y-180");
                } else {
                    cardInner.classList.remove("rotate-y-180");
                }
            }

            function updateUI() {
                if (currentData.length === 0) return;
                const data = currentData[currentIndex];

                // Animation Trigger
                const elements = [
                    "card-title",
                    "card-subtitle",
                    "card-desc",
                    "card-category",
                    "card-sequence",
                ];
                elements.forEach((id) => {
                    const el = document.getElementById(id);
                    el.style.opacity = "0";
                    el.style.transform = "translateY(10px)";
                });
                document.getElementById("card-image").style.opacity = "0.5";

                setTimeout(() => {
                    // Update Content
                    document.getElementById("card-image").src = data.image;
                    document.getElementById("card-sequence").textContent =
                        data.seqThai;
                    document.getElementById("card-category").textContent =
                        data.category;
                    document.getElementById("card-title").textContent =
                        data.title;
                    document.getElementById("card-subtitle").textContent =
                        data.subtitle;
                    document.getElementById("card-desc").textContent =
                        data.desc;
                    document.getElementById("card-mantra-back").textContent =
                        data.mantra;
                    document.getElementById("counter-text").textContent =
                        `${currentIndex + 1} / ${currentData.length}`;

                    // Fade In
                    elements.forEach((id) => {
                        const el = document.getElementById(id);
                        el.style.transition = "all 0.5s ease-out";
                        el.style.opacity = "1";
                        el.style.transform = "translateY(0)";
                    });
                    document.getElementById("card-image").style.opacity = "1";
                }, 200);

                // Update Button States
                document.getElementById("btn-prev").disabled =
                    currentIndex === 0;
                document.getElementById("btn-next").disabled =
                    currentIndex === currentData.length - 1;
            }

            // 6. Interactions (Click, Keyboard, MouseWheel)
            cardContainer.addEventListener("click", () => flipCard());

            document
                .getElementById("btn-next")
                .addEventListener("click", () => {
                    if (currentIndex < currentData.length - 1) {
                        if (isFlipped) flipCard(false);
                        currentIndex++;
                        updateUI();
                    }
                });

            document
                .getElementById("btn-prev")
                .addEventListener("click", () => {
                    if (currentIndex > 0) {
                        if (isFlipped) flipCard(false);
                        currentIndex--;
                        updateUI();
                    }
                });

            // Keyboard Arrow Keys
            document.addEventListener("keydown", (e) => {
                if (
                    e.key === "ArrowRight" &&
                    currentIndex < currentData.length - 1
                ) {
                    document.getElementById("btn-next").click();
                }
                if (e.key === "ArrowLeft" && currentIndex > 0) {
                    document.getElementById("btn-prev").click();
                }
            });

            // Mouse Wheel (Scroll to navigate)
            let scrollTimeout;
            window.addEventListener("wheel", (e) => {
                // ป้องกันไม่ให้เลื่อนรัวเกินไป (Debounce)
                if (scrollTimeout) return;

                // ตรวจสอบว่าไม่ได้ scroll อยู่ในพื้นที่ข้อความขวาบนมือถือ
                if (
                    e.target.closest("section.overflow-y-auto") &&
                    window.innerWidth < 1024
                )
                    return;

                scrollTimeout = setTimeout(() => {
                    if (e.deltaY > 0) {
                        document.getElementById("btn-next").click(); // Scroll Down = Next
                    } else {
                        document.getElementById("btn-prev").click(); // Scroll Up = Prev
                    }
                    scrollTimeout = null;
                }, 400); // ดีเลย์ 400ms ต่อการเลื่อน 1 ที
            });

            // Initialize First View
            updateUI();
        </script>
    </body>
</html>
